# Default values for mongooseim.

replicaCount: 2

image:
  repository: ghcr.io/anmol-11w/mongooseim99
  tag: "latest"
  pullPolicy: Always

mysqlBackend:
  enabled: true
  host: "127.0.0.1"
  port: 3306
  database: "mongooseim"
  username: "mongooseim"
  password: "mongooseim"

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  ports:
    xmppClient:
      port: 5222
      protocol: TCP
    xmppServer:
      port: 5269
      protocol: TCP
    bosh:
      port: 5280
      protocol: TCP
    admin:
      port: 8888
      protocol: TCP

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

livenessProbe:
  tcpSocket:
    port: xmpp-client
  initialDelaySeconds: 120
  periodSeconds: 15

readinessProbe:
  tcpSocket:
    port: xmpp-client
  initialDelaySeconds: 60
  periodSeconds: 10

env: []
# Extra environment variables, e.g.:
# - name: MIM_LOGLEVEL
#   value: "warning"

envFrom: []

extraContainers:
  - name: redis
    image: redis:7
    imagePullPolicy: IfNotPresent
    ports:
      - name: redis
        containerPort: 6379
        protocol: TCP

  - name: mysql
    image: mysql:8.0
    imagePullPolicy: IfNotPresent
    env:
      - name: MYSQL_ROOT_PASSWORD
        value: "secret"
      - name: MYSQL_DATABASE
        value: "mongooseim"
      - name: MYSQL_USER
        value: "mongooseim"
      - name: MYSQL_PASSWORD
        value: "mongooseim"
    command:
      - sh
      - -ec
      - |
        docker-entrypoint.sh mysqld &
        pid="$!"
        echo "Waiting for MySQL to accept connections..."
        until mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
          sleep 2
        done
        if ! mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -D "$MYSQL_DATABASE" -Nse "SHOW TABLES LIKE 'mongoose_cluster_id'" | grep -q mongoose_cluster_id; then
          mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" < /schema/mysql.sql
        fi
        wait "$pid"
    volumeMounts:
      - name: mysql-schema
        mountPath: /schema
        readOnly: true
    ports:
      - name: mysql
        containerPort: 3306
        protocol: TCP

extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
