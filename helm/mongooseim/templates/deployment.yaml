apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mongooseim.fullname" . }}
  labels:
    {{- include "mongooseim.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mongooseim.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mongooseim.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "mongooseim.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mongooseim
          image: {{ include "mongooseim.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.postgresqlBackend.enabled .Values.redisBackend.enabled }}
          command:
            - /bin/bash
            - -ec
            - |
              set -e
              CONF_SOURCE="/etc/mongooseim/mongooseim.toml"
              CONF="/var/lib/mongooseim/mongooseim.runtime.toml"
              cp "$CONF_SOURCE" "$CONF"
              export EJABBERD_CONFIG_PATH="$CONF"
              echo "Using EJABBERD_CONFIG_PATH=$EJABBERD_CONFIG_PATH"

              if [[ -n "${MIM_XMPP_HOST:-}" ]]; then
                awk -v xmpp_host="$MIM_XMPP_HOST" '
                  BEGIN { in_general = 0 }
                  /^\[general\]/ { in_general = 1; print; next }
                  in_general && /^\[/ { in_general = 0 }
                  in_general && /^[[:space:]]*hosts[[:space:]]*=.*/ {
                    printf "  hosts = [\"%s\"]\n", xmpp_host
                    next
                  }
                  in_general && /^[[:space:]]*default_server_domain[[:space:]]*=.*/ {
                    printf "  default_server_domain = \"%s\"\n", xmpp_host
                    next
                  }
                  { print }
                ' "$CONF" > "${CONF}.new"
                mv "${CONF}.new" "$CONF"
              fi

              # Enforce JWT-only authentication regardless of base template values.
              awk '
                BEGIN { in_auth = 0; methods_seen = 0; sasl_seen = 0 }
                /^\[auth\]/ {
                  in_auth = 1
                  methods_seen = 0
                  sasl_seen = 0
                  print
                  next
                }
                in_auth && /^\[/ {
                  if (methods_seen == 0) print "  methods = [\"jwt\"]"
                  if (sasl_seen == 0) print "  sasl_mechanisms = [\"plain\"]"
                  in_auth = 0
                }
                in_auth && /^[[:space:]]*methods[[:space:]]*=.*/ {
                  print "  methods = [\"jwt\"]"
                  methods_seen = 1
                  next
                }
                in_auth && /^[[:space:]]*sasl_mechanisms[[:space:]]*=.*/ {
                  print "  sasl_mechanisms = [\"plain\"]"
                  sasl_seen = 1
                  next
                }
                { print }
                END {
                  if (in_auth == 1) {
                    if (methods_seen == 0) print "  methods = [\"jwt\"]"
                    if (sasl_seen == 0) print "  sasl_mechanisms = [\"plain\"]"
                  }
                }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"

              {{- if .Values.postgresqlBackend.enabled }}
              PG_HOST="${MIM_DB_HOST:-{{ .Values.postgresqlBackend.host }}}"
              PG_PORT="${MIM_DB_PORT:-{{ .Values.postgresqlBackend.port }}}"
              PG_DATABASE="${MIM_DB_NAME:-{{ .Values.postgresqlBackend.database }}}"
              PG_USERNAME="${MIM_DB_USER:-{{ .Values.postgresqlBackend.username }}}"
              PG_PASSWORD="${MIM_DB_PASSWORD:-{{ .Values.postgresqlBackend.password }}}"

              for i in $(seq 1 120); do
                (echo > /dev/tcp/${PG_HOST}/${PG_PORT}) >/dev/null 2>&1 && break
                sleep 1
              done
              sed -i '/^[[:space:]]*outgoing_pools\.rdbms\.default\./d' "$CONF"

              awk '
                BEGIN { skip = 0 }
                /^\[outgoing_pools\.rdbms\.default(\.|\])/ { skip = 1 }
                skip && /^\[/ && $0 !~ /^\[outgoing_pools\.rdbms\.default(\.|\])/ { skip = 0 }
                !skip { print }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"

              printf '\n[outgoing_pools.rdbms.default]\n  scope = "global"\n  workers = 5\n\n  [outgoing_pools.rdbms.default.connection]\n    driver = "pgsql"\n    host = "%s"\n    port = %s\n    database = "%s"\n    username = "%s"\n    password = "%s"\n' "$PG_HOST" "$PG_PORT" "$PG_DATABASE" "$PG_USERNAME" "$PG_PASSWORD" >> "$CONF"
              {{- end }}
              {{- if .Values.redisBackend.enabled }}
              REDIS_HOST="${MIM_REDIS_HOST:-{{ .Values.redisBackend.host }}}"
              REDIS_PORT="${MIM_REDIS_PORT:-{{ .Values.redisBackend.port }}}"
              REDIS_DATABASE="${MIM_REDIS_DATABASE:-{{ .Values.redisBackend.database }}}"

              for i in $(seq 1 120); do
                (echo > /dev/tcp/${REDIS_HOST}/${REDIS_PORT}) >/dev/null 2>&1 && break
                sleep 1
              done

              awk '
                BEGIN { skip = 0 }
                /^\[outgoing_pools\.redis\.global_distrib(\.|\])/ { skip = 1 }
                skip && /^\[/ && $0 !~ /^\[outgoing_pools\.redis\.global_distrib(\.|\])/ { skip = 0 }
                !skip { print }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"

              printf '\n[outgoing_pools.redis.global_distrib]\n  scope = "global"\n  workers = 10\n\n  [outgoing_pools.redis.global_distrib.connection]\n    host = "%s"\n    port = %s\n    database = %s\n' "$REDIS_HOST" "$REDIS_PORT" "$REDIS_DATABASE" >> "$CONF"
              {{- if .Values.redisBackend.username }}
              printf '    username = "{{ .Values.redisBackend.username }}"\n' >> "$CONF"
              {{- end }}
              {{- if .Values.redisBackend.password }}
              printf '    password = "{{ .Values.redisBackend.password }}"\n' >> "$CONF"
              {{- end }}
              {{- end }}
              if [[ -n "${MIM_JWT_PUBLIC_KEY_PATH:-}" ]]; then
                awk -v jwt_path="$MIM_JWT_PUBLIC_KEY_PATH" '
                  BEGIN { in_jwt = 0 }
                  /^\[auth\.jwt\]/ { in_jwt = 1; print; next }
                  in_jwt && /^\[/ {
                    printf "  secret.file = \"%s\"\n", jwt_path
                    in_jwt = 0
                    print
                    next
                  }
                  in_jwt && /^[[:space:]]*secret\.file[[:space:]]*=.*/ {
                    printf "  secret.file = \"%s\"\n", jwt_path
                    next
                  }
                  { print }
                  END {
                    if (in_jwt == 1) {
                      printf "  secret.file = \"%s\"\n", jwt_path
                    }
                  }
                ' "$CONF" > "${CONF}.new"
                mv "${CONF}.new" "$CONF"
              fi
              echo "Configured outgoing_pools in $CONF:"
              grep -n 'outgoing_pools\.rdbms\.default\|outgoing_pools\.redis\.global_distrib\|driver = "pgsql"\|host = \|port = \|database = \|username = ' "$CONF" || true
              exec /usr/lib/mongooseim/bin/mongooseim foreground
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: xmpp-client
              containerPort: 5222
              protocol: TCP
            - name: xmpp-server
              containerPort: 5269
              protocol: TCP
            - name: bosh
              containerPort: 5280
              protocol: TCP
            - name: admin
              containerPort: 8888
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}