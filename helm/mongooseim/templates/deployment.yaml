apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mongooseim.fullname" . }}
  labels:
    {{- include "mongooseim.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mongooseim.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mongooseim.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "mongooseim.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mongooseim
          image: {{ include "mongooseim.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if or .Values.postgresqlBackend.enabled .Values.redisBackend.enabled }}
          command:
            - /bin/bash
            - -ec
            - |
              set -e
              CONF_SOURCE="/etc/mongooseim/mongooseim.toml"
              CONF="/var/lib/mongooseim/mongooseim.runtime.toml"
              JWT_KEY_FILE="/var/lib/mongooseim/jwt_public_key.pem"
              mkdir -p /var/lib/mongooseim
              cp "$CONF_SOURCE" "$CONF"
              export EJABBERD_CONFIG_PATH="$CONF"
              echo "Using EJABBERD_CONFIG_PATH=$EJABBERD_CONFIG_PATH"

              # =========================================================
              # STEP 1: Patch XMPP host if provided
              # =========================================================
              if [[ -n "${MIM_XMPP_HOST:-}" ]]; then
                echo "🌐 Patching XMPP host to: $MIM_XMPP_HOST"
                awk -v xmpp_host="$MIM_XMPP_HOST" '
                  BEGIN { in_general = 0 }
                  /^\[general\]/ { in_general = 1; print; next }
                  in_general && /^\[/ { in_general = 0 }
                  in_general && /^[[:space:]]*hosts[[:space:]]*=.*/ {
                    printf "  hosts = [\"%s\"]\n", xmpp_host
                    next
                  }
                  in_general && /^[[:space:]]*default_server_domain[[:space:]]*=.*/ {
                    printf "  default_server_domain = \"%s\"\n", xmpp_host
                    next
                  }
                  { print }
                ' "$CONF" > "${CONF}.new"
                mv "${CONF}.new" "$CONF"
                echo "✅ XMPP host patched"
              fi

              # =========================================================
              # STEP 2: Replace entire [auth] block with clean JWT-only config
              # =========================================================
              echo "🔐 Rewriting [auth] section for JWT-only authentication..."
              awk '
                BEGIN { in_auth = 0; auth_written = 0 }
                /^\[auth\]/ {
                  in_auth = 1
                  next
                }
                in_auth && /^\[auth\./ {
                  next
                }
                in_auth && /^\[/ {
                  if (auth_written == 0) {
                    print "[auth]"
                    print "  methods = [\"jwt\"]"
                    print "  sasl_mechanisms = [\"plain\"]"
                    print ""
                    auth_written = 1
                  }
                  in_auth = 0
                  print
                  next
                }
                in_auth { next }
                { print }
                END {
                  if (auth_written == 0) {
                    print "[auth]"
                    print "  methods = [\"jwt\"]"
                    print "  sasl_mechanisms = [\"plain\"]"
                    print ""
                  }
                }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"
              echo "✅ [auth] rewritten — all password backends removed"

              # =========================================================
              # STEP 3: Write JWT public key to file and inject [auth.jwt]
              # RSA public keys must be written to a file, not inline value
              # =========================================================
              if [[ -z "${MIM_JWT_PUBLIC_KEY:-}" ]]; then
                echo "❌ FATAL: MIM_JWT_PUBLIC_KEY env var is not set!"
                exit 1
              fi

              echo "🔑 Writing JWT public key to file: $JWT_KEY_FILE"
              # Handle both literal \n and real newlines in the key
              echo "${MIM_JWT_PUBLIC_KEY}" | sed 's/\\\\n/\n/g' > "$JWT_KEY_FILE"
              chmod 600 "$JWT_KEY_FILE"
              echo "✅ JWT public key file written"

              echo "🔑 Injecting [auth.jwt] section with secret.file..."
              printf '\n[auth.jwt]\n  secret.file = "%s"\n  algorithm = "RS256"\n  username_key = "sub"\n' \
                "$JWT_KEY_FILE" >> "$CONF"
              echo "✅ JWT config injected"

              {{- if .Values.postgresqlBackend.enabled }}
              # =========================================================
              # STEP 4: Wait for PostgreSQL and inject DB config
              # =========================================================
              PG_HOST="${MIM_DB_HOST:-{{ .Values.postgresqlBackend.host }}}"
              PG_PORT="${MIM_DB_PORT:-{{ .Values.postgresqlBackend.port }}}"
              PG_DATABASE="${MIM_DB_NAME:-{{ .Values.postgresqlBackend.database }}}"
              PG_USERNAME="${MIM_DB_USER:-{{ .Values.postgresqlBackend.username }}}"
              PG_PASSWORD="${MIM_DB_PASSWORD:-{{ .Values.postgresqlBackend.password }}}"

              echo "🐘 Waiting for PostgreSQL at $PG_HOST:$PG_PORT..."
              for i in $(seq 1 120); do
                (echo > /dev/tcp/${PG_HOST}/${PG_PORT}) >/dev/null 2>&1 && break
                echo "  waiting... ($i/120)"
                sleep 1
              done
              echo "✅ PostgreSQL is reachable"

              awk '
                BEGIN { skip = 0 }
                /^\[outgoing_pools\.rdbms\.default(\.|\])/ { skip = 1 }
                skip && /^\[/ && $0 !~ /^\[outgoing_pools\.rdbms\.default(\.|\])/ { skip = 0 }
                !skip { print }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"

              printf '\n[outgoing_pools.rdbms.default]\n  scope = "global"\n  workers = 5\n\n  [outgoing_pools.rdbms.default.connection]\n    driver = "pgsql"\n    host = "%s"\n    port = %s\n    database = "%s"\n    username = "%s"\n    password = "%s"\n' \
                "$PG_HOST" "$PG_PORT" "$PG_DATABASE" "$PG_USERNAME" "$PG_PASSWORD" >> "$CONF"
              echo "✅ PostgreSQL pool config injected"
              {{- end }}

              {{- if .Values.redisBackend.enabled }}
              # =========================================================
              # STEP 5: Wait for Redis and inject Redis config
              # =========================================================
              REDIS_HOST="${MIM_REDIS_HOST:-{{ .Values.redisBackend.host }}}"
              REDIS_PORT="${MIM_REDIS_PORT:-{{ .Values.redisBackend.port }}}"
              REDIS_DATABASE="${MIM_REDIS_DATABASE:-{{ .Values.redisBackend.database }}}"

              echo "🔴 Waiting for Redis at $REDIS_HOST:$REDIS_PORT..."
              for i in $(seq 1 120); do
                (echo > /dev/tcp/${REDIS_HOST}/${REDIS_PORT}) >/dev/null 2>&1 && break
                echo "  waiting... ($i/120)"
                sleep 1
              done
              echo "✅ Redis is reachable"

              awk '
                BEGIN { skip = 0 }
                /^\[outgoing_pools\.redis\.global_distrib(\.|\])/ { skip = 1 }
                skip && /^\[/ && $0 !~ /^\[outgoing_pools\.redis\.global_distrib(\.|\])/ { skip = 0 }
                !skip { print }
              ' "$CONF" > "${CONF}.new"
              mv "${CONF}.new" "$CONF"

              printf '\n[outgoing_pools.redis.global_distrib]\n  scope = "global"\n  workers = 10\n\n  [outgoing_pools.redis.global_distrib.connection]\n    host = "%s"\n    port = %s\n    database = %s\n' \
                "$REDIS_HOST" "$REDIS_PORT" "$REDIS_DATABASE" >> "$CONF"
              {{- if .Values.redisBackend.username }}
              printf '    username = "{{ .Values.redisBackend.username }}"\n' >> "$CONF"
              {{- end }}
              {{- if .Values.redisBackend.password }}
              printf '    password = "{{ .Values.redisBackend.password }}"\n' >> "$CONF"
              {{- end }}
              echo "✅ Redis pool config injected"
              {{- end }}

              # =========================================================
              # STEP 6: Final verification before startup
              # =========================================================
              echo ""
              echo "📋 Final auth config:"
              grep -A8 "^\[auth\]" "$CONF" || true
              echo ""
              echo "📋 JWT key file check:"
              head -1 "$JWT_KEY_FILE"
              tail -1 "$JWT_KEY_FILE"
              echo ""

              if ! grep -Eq '^[[:space:]]*methods[[:space:]]*=[[:space:]]*\["jwt"\]' "$CONF"; then
                echo "❌ ABORT: methods = [\"jwt\"] not found!"
                exit 1
              fi
              if ! grep -Eq '^\[auth\.jwt\]' "$CONF"; then
                echo "❌ ABORT: [auth.jwt] section missing!"
                exit 1
              fi
              if ! grep -Eq 'secret\.(value|file)[[:space:]]*=' "$CONF"; then
                echo "❌ ABORT: JWT secret not set!"
                exit 1
              fi
              if grep -Eq '^\[auth\.(internal|rdbms|ldap|external)\]' "$CONF"; then
                echo "❌ ABORT: password-based auth backend still present!"
                exit 1
              fi

              echo "✅ All config checks passed — starting MongooseIM..."
              exec /usr/lib/mongooseim/bin/mongooseim foreground
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: xmpp-client
              containerPort: 5222
              protocol: TCP
            - name: xmpp-server
              containerPort: 5269
              protocol: TCP
            - name: bosh
              containerPort: 5280
              protocol: TCP
            - name: admin
              containerPort: 8888
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
