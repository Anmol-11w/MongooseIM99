apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mongooseim.fullname" . }}
  labels:
    {{- include "mongooseim.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "mongooseim.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mongooseim.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "mongooseim.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.mysqlBackend.enabled }}
      initContainers:
        - name: copy-mysql-schema
          image: {{ include "mongooseim.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              cp /usr/lib/mongooseim/priv/mysql.sql /schema/mysql.sql
          volumeMounts:
            - name: mysql-schema
              mountPath: /schema
      {{- end }}
      containers:
        - name: mongooseim
          image: {{ include "mongooseim.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.mysqlBackend.enabled }}
          command:
            - /bin/sh
            - -ec
            - |
              CONF="/etc/mongooseim/mongooseim.toml"
              sed -i 's/^\[auth\.internal\]/[auth.rdbms]/' "$CONF" || true
              if ! grep -q '^\[auth.rdbms\]' "$CONF"; then
                cat <<'EOF' >> "$CONF"

[auth.rdbms]
EOF
              fi
              if ! grep -q '^\[outgoing_pools.rdbms.default\]' "$CONF"; then
                cat >> "$CONF" <<EOF

[outgoing_pools.rdbms.default]
  scope = "global"
  workers = 5

  [outgoing_pools.rdbms.default.connection]
    driver = "mysql"
    host = "{{ .Values.mysqlBackend.host }}"
    port = {{ .Values.mysqlBackend.port }}
    database = "{{ .Values.mysqlBackend.database }}"
    username = "{{ .Values.mysqlBackend.username }}"
    password = "{{ .Values.mysqlBackend.password }}"
EOF
              fi
              exec /usr/lib/mongooseim/bin/mongooseim foreground
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: xmpp-client
              containerPort: 5222
              protocol: TCP
            - name: xmpp-server
              containerPort: 5269
              protocol: TCP
            - name: bosh
              containerPort: 5280
              protocol: TCP
            - name: admin
              containerPort: 8888
              protocol: TCP
          {{- with .Values.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.mysqlBackend.enabled .Values.extraVolumes }}
      volumes:
        {{- if .Values.mysqlBackend.enabled }}
        - name: mysql-schema
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
