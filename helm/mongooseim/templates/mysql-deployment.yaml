apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mongooseim.fullname" . }}-mysql
  labels:
    {{- include "mongooseim.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mongooseim.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mysql
  template:
    metadata:
      labels:
        {{- include "mongooseim.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "secret"
            - name: MYSQL_DATABASE
              value: {{ .Values.mysqlBackend.database | quote }}
            - name: MYSQL_USER
              value: {{ .Values.mysqlBackend.username | quote }}
            - name: MYSQL_PASSWORD
              value: {{ .Values.mysqlBackend.password | quote }}
          command:
            - sh
            - -ec
            - |
              docker-entrypoint.sh mysqld &
              pid="$!"
              until mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" --silent; do
                sleep 2
              done
              mysql -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE" <<'SQL'
              CREATE TABLE IF NOT EXISTS users (
                  username varchar(250),
                  server varchar(250),
                  password text NOT NULL,
                  pass_details text,
                  created_at timestamp NOT NULL DEFAULT CURRENT_TIMESTAMP,
                  PRIMARY KEY (server, username)
              ) CHARACTER SET utf8mb4
                ROW_FORMAT=DYNAMIC;

              CREATE TABLE IF NOT EXISTS mongoose_cluster_id (
                  k varchar(50) PRIMARY KEY,
                  v text
              );
              SQL
              wait "$pid"
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: {{ include "mongooseim.fullname" . }}-mysql-data
