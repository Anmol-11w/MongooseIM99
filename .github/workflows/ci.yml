name: CI

on:
  push:
    branches: [ CI ]
  pull_request:
    branches: [ CI ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  KEEP_COVER_RUNNING: '1'
  SKIP_AUTO_COMPILE: 'true'

jobs:

# =====================================================
# SMALL TESTS
# =====================================================
  small_tests:
    name: small_tests on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        otp: [ '27.3.4.2', '28.0.2' ]

    env:
      PRESET: 'small_tests'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: create certificates
        run: make certs

      - name: run test
        run: tools/test.sh -p $PRESET -s true -e true

      - name: prepare coverage report
        run: ./rebar3 codecov analyze --lcov --json false

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-otp-${{ matrix.otp }}
          path: lcov.info
          retention-days: 30


# =====================================================
# BIG TESTS (NON-BLOCKING)
# =====================================================
  big_tests:
    name: ${{ matrix.preset }} on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        preset:
          - internal_mnesia
          - pgsql_mnesia
          - ldap_mnesia
          - elasticsearch_and_cassandra_mnesia
        otp: [ '28.0.2' ]
        include:
          - test-spec: "default.spec"
          - preset: elasticsearch_and_cassandra_mnesia
            test-spec: "mam.spec"
          - preset: ldap_mnesia
            otp: '27.3.4.2'
            test-spec: "default.spec"
          - preset: pgsql_mnesia
            otp: '27.3.4.2'
            test-spec: "default.spec"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run big tests (non-blocking)
        uses: ./.github/actions/big-tests
        continue-on-error: true
        with:
          otp: ${{ matrix.otp }}
          preset: ${{ matrix.preset }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          test-spec: ${{ matrix.test-spec }}


# =====================================================
# DYNAMIC DOMAIN BIG TESTS (NON-BLOCKING)
# =====================================================
  dynamic_domains_big_tests:
    name: dynamic domains ${{ matrix.preset }} on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        preset: [ pgsql_mnesia ]
        otp: [ '28.0.2' ]
        test-spec: [ "dynamic_domains.spec" ]
        include:
          - preset: pgsql_mnesia
            otp: '27.3.4.2'
            test-spec: "dynamic_domains.spec"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run dynamic big tests (non-blocking)
        uses: ./.github/actions/big-tests
        continue-on-error: true
        with:
          otp: ${{ matrix.otp }}
          preset: ${{ matrix.preset }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          test-spec: ${{ matrix.test-spec }}


# =====================================================
# KUBERNETES BACKEND SMOKE TESTS (NON-BLOCKING)
# =====================================================
  kubernetes_backends_smoke:
    name: kubernetes smoke ${{ matrix.preset }}
    runs-on: ubuntu-22.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        preset:
          - internal_mnesia
          - pgsql_mnesia
          - ldap_mnesia
          - elasticsearch_and_cassandra_mnesia

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Kubernetes-in-Docker (kind)
        uses: helm/kind-action@v1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Run backend smoke profile in Kubernetes
        run: bash tools/k8s-backends-smoke.sh "${{ matrix.preset }}"

      - name: Dump Kubernetes state on failure
        if: failure()
        run: |
          kubectl get ns || true
          kubectl get pods -A -o wide || true
          kubectl get svc -A || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -n 200 || true


# =====================================================
# STATIC CHECKS (BLOCKING)
# =====================================================
  dialyzer:
    name: dialyzer on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p dialyzer_only


  xref:
    name: xref on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p xref_only


  edoc:
    name: edoc on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p edoc_only


# =====================================================
# DOCKER IMAGE BUILD (BLOCKING)
# =====================================================
  docker_image:
    name: docker image build
    runs-on: ubuntu-22.04
    needs: [ small_tests, dialyzer, xref, edoc ]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare image tags
        id: image
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${REPO_LC}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "run_tag=${IMAGE}:run-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${IMAGE}:${BRANCH_TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "latest_tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app Docker image
        run: docker build --tag "${{ steps.image.outputs.sha_tag }}" .

      - name: Smoke test Docker image
        run: docker run --rm --entrypoint /usr/lib/mongooseim/bin/mongooseim "${{ steps.image.outputs.sha_tag }}" version --simple

      - name: Tag branch / run-number / latest images
        run: |
          docker tag "${{ steps.image.outputs.sha_tag }}" "${{ steps.image.outputs.branch_tag }}"
          docker tag "${{ steps.image.outputs.sha_tag }}" "${{ steps.image.outputs.run_tag }}"
          if [[ -n "${{ steps.image.outputs.latest_tag }}" ]]; then
            docker tag "${{ steps.image.outputs.sha_tag }}" "${{ steps.image.outputs.latest_tag }}"
          fi

      - name: Push image to GHCR
        run: |
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.branch_tag }}"
          docker push "${{ steps.image.outputs.run_tag }}"
          if [[ -n "${{ steps.image.outputs.latest_tag }}" ]]; then
            docker push "${{ steps.image.outputs.latest_tag }}"
          fi


# =====================================================
# PACKAGE BUILD (BLOCKING)
# =====================================================
  pkg:
    name: ${{ matrix.pkg }} package
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        pkg: [ ubuntu-jammy ]

    env:
      pkg_OTP_VERSION: "28.0.2"
      pkg_PLATFORM: ${{ matrix.pkg }}
      GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASS: ${{ secrets.GPG_PASS }}

    steps:
      - uses: actions/checkout@v4
      - run: tools/test.sh -p pkg


# =====================================================
# AUTO DEPLOY
# =====================================================
  deploy:
    name: Deploy to production
    runs-on: ubuntu-22.04
    needs: docker_image
    if: github.ref_name == 'CI'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SHORT_SHA: ${{ github.sha }}
          DEPLOY_REF: ${{ github.ref_name }}
          DB_HOST: ${{ secrets.MIM_DB_HOST }}
          DB_PORT: ${{ secrets.MIM_DB_PORT }}
          DB_NAME: ${{ secrets.MIM_DB_NAME }}
          DB_USER: ${{ secrets.MIM_DB_USER }}
          DB_PASSWORD: ${{ secrets.MIM_DB_PASSWORD }}
          XMPP_HOST: ${{ secrets.MIM_XMPP_HOST }}
          JWT_PUBLIC_KEY: ${{ secrets.MIM_JWT_PUBLIC_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SHORT_SHA,DEPLOY_REF,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,XMPP_HOST,JWT_PUBLIC_KEY
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            cd /opt/MongooseIM99

            git fetch origin "${DEPLOY_REF}"
            git checkout "${DEPLOY_REF}" || git checkout -b "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
            git pull --ff-only origin "${DEPLOY_REF}"

            SHORT_SHA="${SHORT_SHA:0:7}"
            MIM_NS="mim"
            APP_DEPLOY="mim-mongooseim"
            PG_DEPLOY="mim-mongooseim-postgresql"
            REDIS_DEPLOY="mim-mongooseim-redis"

            # ✅ Validate all required secrets are present before doing anything
            MISSING=""
            [[ -z "$DB_HOST" ]]        && MISSING="$MISSING DB_HOST"
            [[ -z "$DB_PASSWORD" ]]    && MISSING="$MISSING DB_PASSWORD"
            [[ -z "$JWT_PUBLIC_KEY" ]] && MISSING="$MISSING JWT_PUBLIC_KEY"
            [[ -z "$XMPP_HOST" ]]      && MISSING="$MISSING XMPP_HOST"
            if [[ -n "$MISSING" ]]; then
              echo "❌ Missing required secrets:$MISSING"
              echo "   Set these in GitHub → Settings → Secrets and variables → Actions"
              exit 1
            fi
            echo "✅ All required secrets present"

            get_generation() {
              kubectl get deployment "$1" -n "$MIM_NS" \
                -o jsonpath='{.metadata.generation}' 2>/dev/null || echo "absent"
            }

            PG_GEN_BEFORE="$(get_generation "$PG_DEPLOY")"
            REDIS_GEN_BEFORE="$(get_generation "$REDIS_DEPLOY")"

            # ✅ Inject all secrets as env vars on the MongooseIM deployment
            # The deployment.yaml startup script reads these and writes them
            # into the runtime config — no hardcoded values anywhere
            echo "🔐 Injecting secrets as pod environment variables..."
            kubectl set env deployment/${APP_DEPLOY} -n "$MIM_NS" \
              MIM_DB_HOST="${DB_HOST}" \
              MIM_DB_PORT="${DB_PORT:-5432}" \
              MIM_DB_NAME="${DB_NAME}" \
              MIM_DB_USER="${DB_USER}" \
              MIM_DB_PASSWORD="${DB_PASSWORD}" \
              MIM_XMPP_HOST="${XMPP_HOST}" \
              MIM_JWT_PUBLIC_KEY="${JWT_PUBLIC_KEY}"
            echo "✅ Secrets injected as env vars"

            # ✅ Deploy new image via Helm (only image changes, secrets stay as env vars)
            echo "🚀 Deploying image: ghcr.io/anmol-11w/mongooseim99:sha-${SHORT_SHA}"
            helm upgrade --install mim-mongooseim ./helm/mongooseim \
              --namespace "$MIM_NS" \
              --reuse-values \
              --set image.repository="ghcr.io/anmol-11w/mongooseim99" \
              --set image.tag="sha-${SHORT_SHA}" \
              --set image.pullPolicy="Always"

            echo "⏳ Waiting for rollout to complete..."
            kubectl rollout status deployment/${APP_DEPLOY} -n "$MIM_NS" --timeout=300s
            echo "✅ Rollout complete"

            # ✅ Verify JWT-only auth in the runtime config inside the pod
            echo ""
            echo "🔍 Verifying JWT-only auth policy in runtime config..."
            kubectl exec deployment/${APP_DEPLOY} -n "$MIM_NS" -c mongooseim -- sh -ec '
              CONF="/var/lib/mongooseim/mongooseim.runtime.toml"

              if [ ! -f "$CONF" ]; then
                echo "❌ Runtime config not found at $CONF"
                exit 1
              fi

              echo "📄 Auth section in runtime config:"
              grep -A12 "^\[auth\]" "$CONF" || true
              echo ""

              # Must have methods = ["jwt"]
              if ! grep -Eq "methods\s*=\s*\[\"jwt\"\]" "$CONF"; then
                echo "❌ FAILED: methods = [\"jwt\"] not found — password login may be open!"
                exit 1
              fi

              # Must have sasl_mechanisms = ["plain"]
              if ! grep -Eq "sasl_mechanisms\s*=\s*\[\"plain\"\]" "$CONF"; then
                echo "❌ FAILED: sasl_mechanisms = [\"plain\"] not found"
                exit 1
              fi

              # Must have [auth.jwt] section
              if ! grep -Eq "^\[auth\.jwt\]" "$CONF"; then
                echo "❌ FAILED: [auth.jwt] section missing"
                exit 1
              fi

              # Must have secret configured
              if ! grep -Eq "secret\.(value|file)\s*=" "$CONF"; then
                echo "❌ FAILED: JWT secret not configured"
                exit 1
              fi

              # Must NOT have any password-based auth backend
              if grep -Eq "^\[auth\.(internal|rdbms|ldap|external)\]" "$CONF"; then
                echo "❌ FAILED: password-based auth backend found — users can login with password!"
                exit 1
              fi

              echo "✅ JWT-only auth verified — password login is BLOCKED"
            '

            # ✅ Verify DB config has no hardcoded fallback values
            echo ""
            echo "🔍 Verifying DB config has no hardcoded values..."
            kubectl exec deployment/${APP_DEPLOY} -n "$MIM_NS" -c mongooseim -- sh -ec '
              CONF="/var/lib/mongooseim/mongooseim.runtime.toml"

              echo "📄 DB config in runtime config:"
              grep -E "driver|host|port|database|username" "$CONF" | grep -v "^#" || true
              echo ""

              if grep -q "host = \"localhost\"" "$CONF"; then
                echo "❌ FAILED: hardcoded localhost found in DB config!"
                exit 1
              fi

              if grep -q "mongooseim_secret" "$CONF"; then
                echo "❌ FAILED: hardcoded default password found in DB config!"
                exit 1
              fi

              echo "✅ DB config verified — no hardcoded values"
            '

            # ✅ Verify PostgreSQL and Redis deployments were NOT changed
            PG_GEN_AFTER="$(get_generation "$PG_DEPLOY")"
            REDIS_GEN_AFTER="$(get_generation "$REDIS_DEPLOY")"

            if [[ "$PG_GEN_BEFORE" != "$PG_GEN_AFTER" ]]; then
              echo "❌ PostgreSQL deployment changed unexpectedly! (${PG_GEN_BEFORE} -> ${PG_GEN_AFTER})"
              exit 1
            fi

            if [[ "$REDIS_GEN_BEFORE" != "$REDIS_GEN_AFTER" ]]; then
              echo "❌ Redis deployment changed unexpectedly! (${REDIS_GEN_BEFORE} -> ${REDIS_GEN_AFTER})"
              exit 1
            fi

            echo "✅ PostgreSQL and Redis deployments unchanged"
            echo ""
            echo "✅ Deployment complete!"
            echo ""
            echo "📦 Running pods:"
            kubectl get pods -n "$MIM_NS"
            echo ""
            echo "🔍 Image verification:"
            kubectl get pods -n "$MIM_NS" \
              -o jsonpath='{range .items[*]}{.metadata.name}{" -> "}{.status.containerStatuses[0].imageID}{"\n"}{end}'


# =====================================================
# MONITORING DEPLOY
# =====================================================
  deploy_monitoring:
    name: Deploy monitoring stack
    runs-on: ubuntu-22.04
    needs: docker_image
    if: github.ref_name == 'CI'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if monitoring changed
        id: check
        run: |
          if git diff HEAD~1 HEAD -- monitoring-values.yaml | grep -q .; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy monitoring via SSH
        if: steps.check.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            cd /opt/MongooseIM99
            helm repo add grafana https://grafana.github.io/helm-charts || true
            helm repo update
            helm upgrade --install loki grafana/loki-stack \
              --namespace monitoring \
              --create-namespace \
              -f monitoring-values.yaml