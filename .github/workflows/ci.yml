name: CI

on:
  push:
    branches: [ ci ]
  workflow_dispatch:

env:
  KEEP_COVER_RUNNING: '1'
  SKIP_AUTO_COMPILE: 'true'

  # required for tools/gh-upload-to-s3.sh script
  # AWS_DEFAULT_REGION: "${{ secrets.AWS_DEFAULT_REGION }}"
  # AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
  # AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

jobs:

# =====================================================
# SMALL TESTS 
# =====================================================
  small_tests:
    name: small_tests on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        otp: [ '27.3.4.2', '28.0.2' ]

    env:
      PRESET: 'small_tests'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: create certificates
        run: make certs

      - name: run test
        run: tools/test.sh -p $PRESET -s true -e true

      - name: prepare coverage report
        run: ./rebar3 codecov analyze --lcov --json false

      - name: upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-otp-${{ matrix.otp }}
          path: lcov.info
          retention-days: 30


# =====================================================
# BIG TESTS (NON-BLOCKING – INFORMATIVE ONLY)
# =====================================================
  big_tests:
    name: ${{ matrix.preset }} on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        preset:
          - internal_mnesia
          - pgsql_mnesia
          - mysql_redis
          - ldap_mnesia
          - elasticsearch_and_cassandra_mnesia
        otp: [ '28.0.2' ]
        include:
          - test-spec: "default.spec"
          - preset: elasticsearch_and_cassandra_mnesia
            test-spec: "mam.spec"
          - preset: ldap_mnesia
            otp: '27.3.4.2'
            test-spec: "default.spec"
          - preset: pgsql_mnesia
            otp: '27.3.4.2'
            test-spec: "default.spec"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run big tests (non-blocking)
        uses: ./.github/actions/big-tests
        with:
          otp: ${{ matrix.otp }}
          preset: ${{ matrix.preset }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          test-spec: ${{ matrix.test-spec }}


# =====================================================
# DYNAMIC DOMAIN BIG TESTS (NON-BLOCKING)
# =====================================================
  dynamic_domains_big_tests:
    name: dynamic domains ${{ matrix.preset }} on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        preset: [ pgsql_mnesia, mysql_redis ]
        otp: [ '28.0.2' ]
        test-spec: [ "dynamic_domains.spec" ]
        include:
          - preset: pgsql_mnesia
            otp: '27.3.4.2'
            test-spec: "dynamic_domains.spec"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run dynamic big tests (non-blocking)
        uses: ./.github/actions/big-tests
        with:
          otp: ${{ matrix.otp }}
          preset: ${{ matrix.preset }}
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          test-spec: ${{ matrix.test-spec }}


# =====================================================
# STATIC CHECKS (BLOCKING)
# =====================================================
  dialyzer:
    name: dialyzer on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p dialyzer_only


  xref:
    name: xref on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p xref_only


  edoc:
    name: edoc on OTP ${{ matrix.otp }}
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        otp: [ '27.3.4.2' ]

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
      - run: tools/test.sh -p edoc_only


# =====================================================
# PACKAGE BUILD (BLOCKING)
# =====================================================
  pkg:
    name: ${{ matrix.pkg }} package
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        pkg: [ ubuntu-jammy ]

    env:
      pkg_OTP_VERSION: "28.0.2"
      pkg_PLATFORM: ${{ matrix.pkg }}
      GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASS: ${{ secrets.GPG_PASS }}

    steps:
      - uses: actions/checkout@v4
      - run: tools/test.sh -p pkg