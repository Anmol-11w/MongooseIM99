apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongooseim
  labels:
    app: mongooseim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongooseim
  template:
    metadata:
      labels:
        app: mongooseim
    spec:
      # pull secret so Kubernetes can access GHCR
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: mongooseim
          # change the tag to pin a specific build, e.g. sha-f7a576c or run-13
          image: ghcr.io/anmol-11w/mongooseim99:latest
          imagePullPolicy: Always        # always fetch the latest tag on pod start
          ports:
            - name: xmpp-client
              containerPort: 5222
            - name: xmpp-s2s
              containerPort: 5269
            - name: admin-http
              containerPort: 8088
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 5222
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 5222
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mongooseim
spec:
  selector:
    app: mongooseim
  type: LoadBalancer          # use NodePort if no cloud load balancer
  ports:
    - name: xmpp-client
      port: 5222
      targetPort: 5222
    - name: xmpp-s2s
      port: 5269
      targetPort: 5269
    - name: admin-http
      port: 8088
      targetPort: 8088
