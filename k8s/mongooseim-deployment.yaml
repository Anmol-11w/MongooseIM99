apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongooseim
  labels:
    app: mongooseim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongooseim
  template:
    metadata:
      labels:
        app: mongooseim
    spec:
      # pull secret so Kubernetes can access GHCR
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: mongooseim
          image: ghcr.io/anmol-11w/mongooseim99:latest
          imagePullPolicy: Always        
          ports:
            - name: xmpp-client
              containerPort: 7070
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 20
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: mongooseim
spec:
  selector:
    app: mongooseim
  type: LoadBalancer          # use NodePort if no cloud load balancer
  ports:
    - name: xmpp-client
      port: 7070
      targetPort: 7070
